services:
  snowcam-reporter:
    build: .
    container_name: snowcam-reporter
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # If using file-based ADC inside container, mount JSON key and set
      # GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/adc.json in .env
      # - ./secrets/adc.json:/app/secrets/adc.json:ro
    command: ["python", "snow_reporter.py", "--interval-minutes", "30"]
